id: codex-subaccount-apply
scenario_type: btp-admin
execution_mode: apply
description: >
  Create or locate a SAP BTP trial account, create the subaccount
  `codex-subaccount`, enable the services needed for Integration Suite and API
  access, and capture service-key endpoint details for downstream CPI work.
source_tenant: {}
target_tenant:
  landscape: sap-btp-trial
  subaccount_name: Codex-demo-project
  region: ""
  cloud_foundry:
    required: true
    org_name: codex-demo-project
    space_name: dev
packages: []
artifacts: []
inputs:
  purpose: prepare BTP trial prerequisites for CPI and Integration Suite work
  technical_description: >
    Use prior RS Playwright knowledge for navigation and troubleshooting, but
    re-establish browser state during execution. Keep credentials and service
    keys outside Git-tracked files.
  specifications:
    - knowledge/btp/trial-account-playbook.md
    - knowledge/btp/known-findings.md
    - skills/btp-admin/CHECKLIST.md
    - skills/btp-admin/EXECUTION_PLAN.md
    - skills/btp-admin/HANDOFF_TEMPLATE.md
  browser_automation:
    tool: playwright
    required: true
  secret_sources:
    - C:\Users\janis.petersons\Desktop\Codex\Suser.txt
  account_bootstrap:
    allow_trial_account_creation: true
    reuse_existing_subaccount_if_name_matches: false
  integration_suite:
    required_capabilities:
      - Cloud Integration
    create_runtime_instances:
      - api
      - integration-flow
  required_outputs:
    - trial account status
    - codex-subaccount status
    - cloud foundry status
    - Integration Suite capability status
    - service key metadata
    - tenant management endpoint
    - API endpoint
deliverables:
  - run-report
  - handoff-notes
approval_policy:
  unlock_design_time_locks: ask
  modify_tenant_state: ask
  create_cloud_accounts: ask
